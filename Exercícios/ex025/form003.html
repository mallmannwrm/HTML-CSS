<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            border: 1px solid black;
            border-radius: 10px;
            width: 300px;
            padding: 0 10px;
            background-color: lightgrey;
            box-shadow: 1px 2px 2px rgba(0, 0, 0, 0.3);
        }
        input {
            border-radius: 4px;
            border: 1px solid grey;
            padding: 3px;
            margin-top: 3px;
        }
        label {
            font-weight: bold;
            font-family: Arial, Helvetica, sans-serif;
            padding-left: 2px;
        }
        input:hover {
            box-shadow: 1px 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <h1>Testando formulários</h1>
    <form action="cadastro.php" method="get"></form>
    <div>
        <p>
            <label for="inome">Nome:</label><br>
            <input type="text" name="nome" id="inome" required maxlength="30" placeholder="Nome completo" autocomplete="name">
        </p>
        <p>
            <label for="imedia">Média:</label><br>
            <input type="number" name="media" id="imedia" min="0" max="10" step="0.05">
        </p>
        <p>
            <label for="imes">Período:</label><br>
            <input type="month" name="mes" id="imes">
        </p>
        <p>
            <label for="idia">Dia da prova:</label><br>
            <input type="date" name="dia" id="idia">
        </p>
        <p>
            <label for="ihora">Hora exata da avaliação:</label><br>
            <input type="time" name="hora" id="ihora">
        </p>
    </div>
    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
</body>
</html>
