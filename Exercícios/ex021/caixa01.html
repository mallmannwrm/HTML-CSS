<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <style>
        * {
            text-align: justify;
            margin: 5px auto 15px;
        }
        p {
            font-size: 1.3em;
        }
        h1 {
            background-color: grey;
            height:1.5em;
            width: 10em;
            border-width:1px;
            border-style: solid;
            padding: 0.5rem;
        }
        a {
            padding:3px;
            border: 1px;
            border-style: dotted;
        }
    </style>
</head>
<body>
    <h1>Caixas Box-level</h1>
    <p>O próprio h1, mas também os parágrafos, são exemplos de box-level, enquanto <a href="#">links</a> são inline-level</p>
</body>
</html>
