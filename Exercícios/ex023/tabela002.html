<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas 2</title>
    <style>
        table{
            border-collapse: collapse;
            width: 415px;
            font-family: Arial, Helvetica, sans-serif;
            position: relative;
        }
        td, th {
            border: 1px solid black;
            text-align: left;
            padding: 10px;
        }
        thead, tfoot {
            background-color: rgb(24, 98, 14);
            color: white;
        }
        tbody > tr:nth-child(odd) {
            background-color: lightgray;
        }
         tbody > tr:nth-child(even) {
            font-weight: bold;
        }
        thead > tr > th {
            position: sticky;
            top: -1px;
            background-color:rgb(24, 98, 14);
        }
        caption {
            font-weight: bold;
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(24, 98, 14);
            color: white;
            padding: 10px;
            border: 1px solid black;
        }
        .num {
            text-align: right;
        }
    </style>
</head>
<body>
    <table>
        <caption>População dos 6 estados mais populosos do Brasil</caption>
        <thead>
            <th scope="col">Unidade federativa</th>
            <th scope="col" style="width: 100px; text-align: right;">População</th>
        </thead>
        <tbody>
            <tr>
                <td>São Paulo</td>
                <td class="num">46 081 801</td>
            </tr>
            <tr>
                <td>Minas Gerais</td>
                <td class="num">21 393 44</td>
            </tr>
            <tr>
                <td>Rio de Janeiro</td>
                <td class="num">17 223 547</td>
            </tr>
            <tr>
                <td>Bahia</td>
                <td class="num">14 870 907</td>
            </tr>
            <tr>
                <td>Paraná</td>
                <td class="num">11 890 517</td>
            </tr>
            <tr>
                <td>Rio Grande do Sul</td>
                <td class="num">11 233 263</td>
            </tr>
        </tbody>
        <tfoot>
            <th scope="row">Total de habitantes</th>
            <td class="num"><strong>122.693.475</strong></td>
        </tfoot>
    </table>
</body>
</html>
