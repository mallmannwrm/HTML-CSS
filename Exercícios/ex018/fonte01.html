<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes do Google Fonts</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap");
        body {
            font: normal normal 1em Arial, Helvetica, sans-serif;
            color: black;
        }
        h1 {
            font-family: "Roboto Mono", Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Assumenda id maiores dolores inventore dicta voluptatibus, corporis repellat totam quaerat! Itaque quae nam fuga, vero ullam magnam molestias dolorem ipsa deleniti?</p>
</body>
</html>
